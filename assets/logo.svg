<svg width="900" height="50" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: "Orbitron", monospace;
      font-size: 28px;
      font-weight: bold;
      fill: url(#grad);
      filter: url(#glow);
      letter-spacing: 2px;
    }
    .glitch {
      fill: url(#grad);
      opacity: 0.25;
    }
  </style>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff69b4"/>
      <stop offset="100%" stop-color="#ff69b4" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text">
    met4lk1tty
  </text>

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text glitch">
    met4lk1tty
  </text>
</svg>
